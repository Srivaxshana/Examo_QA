name: Java CI/CD Pipeline
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: sri1708
          MYSQL_DATABASE: examo_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -psri1708"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    
    env:
      SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/examo_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: sri1708
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      
      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -uroot -psri1708 >/dev/null 2>&1; then
              echo "✅ MySQL is ready"
              break
            fi
            echo "⏳ Waiting for MySQL... ($i/30)"
            sleep 5
          done
      
      - name: Install wait-on
        run: npm install -g wait-on
      
      # Build backend
      - name: Build backend
        run: mvn clean install -DskipTests
        working-directory: examo-backend/examo-backend
      
      # Start backend
      - name: Start backend
        run: |
          nohup mvn spring-boot:run > backend.log 2>&1 &
          echo $! > backend.pid
        working-directory: examo-backend/examo-backend
      
      # Wait for backend
      - name: Wait for backend health
        run: |
          wait-on -t 120000 http://localhost:8080/actuator/health || \
          (echo "❌ Backend failed to start" && \
           cat examo-backend/examo-backend/backend.log && \
           exit 1)
      
      # Set up Node.js 20 (FIXED VERSION)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      # Build frontend
      - name: Build frontend
        run: |
          cd examo-frontend
          npm ci
          npm run build
      
      # Start frontend
      - name: Start frontend
        run: |
          cd examo-frontend
          nohup npm run preview -- --host 0.0.0.0 --port 3000 > ../frontend.log 2>&1 &
          echo $! > ../frontend.pid
      
      # Wait for frontend with better error handling
      - name: Wait for frontend
        run: |
          wait-on -t 60000 http://localhost:3000 || \
          (echo "❌ Frontend failed to start" && \
           cat frontend.log && \
           exit 1)
      
      # Stabilization delay
      - name: Wait for services to stabilize
        run: sleep 5
      
      # Run tests
      - name: Run tests
        run: mvn test
        working-directory: examo-backend/examo-backend
      
      # Upload test reports
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            examo-backend/examo-backend/target/surefire-reports
            examo-backend/examo-backend/target/cucumber-reports
            examo-backend/examo-backend/backend.log
            frontend.log
